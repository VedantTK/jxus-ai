<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Agent</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="extra.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fa-solid fa-sparkles"></i>
                    <span>Jxus AI</span>
                </div>
                <!-- Close btn for mobile -->
                <button class="icon-btn mobile-close-btn" id="closeSidebarBtn">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <button class="new-chat-btn" id="newChatBtn">
                <i class="fa-solid fa-plus"></i>
                <span>New Chat</span>
            </button>

            <div class="history-list" id="historyList">
                <p class="history-label">Recent</p>
                <!-- Dynamic history items will be injected here -->
            </div>

            <div class="sidebar-footer">
                <button class="theme-toggle-btn" id="themeToggle">
                    <i class="fa-regular fa-sun" id="themeIcon"></i>
                    <span id="themeText">Light Mode</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <button class="icon-btn mobile-menu-btn" id="openSidebarBtn">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <div class="header-title">Jxus AI Chat</div>
                <div class="header-actions">
                    <button class="icon-btn" id="settingsBtn"><i class="fa-solid fa-gear"></i></button>
                </div>
            </header>

            <div class="chat-container" id="chatContainer">
                <!-- Welcome Section -->
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-icon">
                        <i class="fa-solid fa-sparkles"></i>
                    </div>
                    <h1>How can I help you today?</h1>
                    <div class="suggestion-chips">
                        <button class="chip">Write a python script</button>
                        <button class="chip">Explain string theory</button>
                        <button class="chip">Brainstorm marketing ideas</button>
                    </div>
                </div>

                <!-- Messages will be injected here -->
                <div class="messages-wrapper" id="messagesWrapper"></div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <textarea id="chatInput" placeholder="Message Jxus AI..." rows="1"></textarea>
                    <button class="send-btn" id="sendBtn" disabled>
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
                <div class="footer-text">
                    Jxus AI can make mistakes. Consider verifying important information.
                </div>
            </div>
        </main>
    </div>
    <!-- Overlay for mobile sidebar -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Settings</h2>
                <button class="icon-btn" id="closeSettingsBtn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <p>Welcome to Jxus AI Settings!</p>
                <p>Currently running fast & locally via Ollama.</p>
                <div style="margin-top: 20px;">
                    <label>AI Model</label>
                    <select
                        style="width: 100%; padding: 8px; margin-top: 8px; border-radius: 6px; background: var(--bg-primary); color: var(--text-primary); border: 1px solid var(--border-color);">
                        <option>tinyllama (Local)</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
