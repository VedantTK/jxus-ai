version: '3.8'

services:
  # The AI Language Model Service
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  # The FastAPI Backend
  backend:
    build: ./backend
    container_name: ai_backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_URL=http://ollama:11434/api/generate
      - OLLAMA_MODEL=tinyllama
    depends_on:
      - ollama
    restart: unless-stopped

  # The Static Frontend with Nginx Reverse Proxy
  frontend:
    build: ./frontend
    container_name: ai_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ollama_data:
